<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingrid & Matheus</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root {
  --offwhite: #f6f1e9;
  --gold: #c6a96b;
  --text: #2b2b2b;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--offwhite);
    color: var(--text);
    position: relative;
}

/* AQUARELA */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("img3.png") no-repeat center/cover;
  opacity:0.15;
  z-index:-1;
}

/* CARD RSVP */
.rsvp-card{
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
}

/* INPUT */
.input{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(255,255,255,0.6);
}

/* BOTÃO PRINCIPAL */
.botao{
    margin-top:15px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:40px;
    background:linear-gradient(135deg,var(--gold),#e3d2a2);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.botao:hover{
    transform:translateY(-2px);
}

/* LISTA CONVIDADOS */
.item{
    border:1px solid rgba(0,0,0,0.05);
    padding:12px;
    border-radius:12px;
    margin-bottom:8px;
    background:white;
}

</style>
</head>

<body>

<div class="max-w-5xl mx-auto px-4 pb-16">

<!-- HEADER -->
<header class="py-6 flex justify-between items-center">
    <h1 class="text-2xl" style="font-family:'Playfair Display'; color:var(--gold);">
        Ingrid & Matheus
    </h1>

    <a href="#rsvp"
       class="botao" style="width:auto; padding:10px 20px;">
       Confirmar presença
    </a>
</header>

<!-- HERO -->
<section class="pt-16 pb-20 text-center">
    <p class="text-gray-500 mb-4">Nosso grande dia</p>

    <h2 class="text-5xl font-light" style="font-family:'Playfair Display';">
        Ingrid <span style="color:var(--gold)">&</span> Matheus
    </h2>

    <p class="mt-6 text-gray-600">
        Estamos felizes em compartilhar esse momento com você
    </p>

    <div class="mt-10">
        <a href="#rsvp" class="botao" style="width:auto; padding:16px 30px;">
            Confirmar presença 💍
        </a>
    </div>
</section>

<!-- RSVP -->
<section id="rsvp" class="py-16">

    <h3 class="text-3xl text-center mb-10" style="font-family:'Playfair Display';">
        Confirme sua presença
    </h3>

    <div class="max-w-md mx-auto rsvp-card">

        <input id="nome"
            type="text"
            placeholder="Digite seu nome"
            class="input">

        <button onclick="validarNome()" class="botao">
            Buscar meu convite
        </button>

        <div id="resultado" class="mt-6"></div>

        <!-- BOTÃO ADICIONADO (ÚNICA ALTERAÇÃO) -->
        <a href="index.html"
           style="display:block; margin-top:15px; font-size:13px; color:#777; text-align:center; text-decoration:none;">
           ← Voltar ao convite
        </a>

    </div>

</section>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxjG9ft2UBqbQGLYjO8iUq-DRgkyfe91C6gJQ7Aa_VTi8OlxVwqcFF5P8CsxBnvDH1Jng/exec";

async function validarNome() {
    const nome = document.getElementById("nome").value.trim();

    document.getElementById("resultado").innerHTML = "Buscando...";

    const res = await fetch(`${API_URL}?acao=validar&nome=${encodeURIComponent(nome)}`);
    const data = await res.json();

    if (!data.encontrado) {
        document.getElementById("resultado").innerHTML = "Nome não encontrado";
        return;
    }

    let html = `<p class="mb-4">Convite de <b>${data.responsavel}</b></p>`;

    data.convidados.forEach(p => {
        const checked = p.status === "Confirmado" ? "checked disabled" : "";

        html += `
        <div class="item">
            <label>
                <input type="checkbox" value="${p.nome}" ${checked}>
                ${p.nome}
            </label>
        </div>`;
    });

    if (data.bloqueado) {
        html += `<p style="color:var(--gold); margin-top:10px;">Presença já confirmada 🤍</p>`;
    } else {
        html += `
        <button onclick="confirmarPresenca()" class="botao">
        Confirmar presença
        </button>`;
    }

    document.getElementById("resultado").innerHTML = html;
}

async function confirmarPresenca() {
    const selecionados = document.querySelectorAll("input[type=checkbox]:checked");
    const nomes = Array.from(selecionados).map(c => c.value).join("|");

    await fetch(`${API_URL}?acao=confirmar&nomes=${encodeURIComponent(nomes)}`);

    document.getElementById("resultado").innerHTML =
        "<p style='color:var(--gold);'>Presença confirmada 🤍</p>";
}
</script>

</body>
</html>
