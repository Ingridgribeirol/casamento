<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmar Presença</title>

<style>

body{
  font-family: 'Montserrat', sans-serif;
  background:#f6f1e9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:380px;
  padding:30px;
  text-align:center;
}

h2{
  font-family: 'Playfair Display';
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:30px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:30px;
  background:#c6a96b;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.sucesso{
  margin-top:20px;
  color:#6b8e6b;
  font-size:14px;
  display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Confirmar presença</h2>

<input id="nome" placeholder="Seu nome completo">

<select id="lado">
<option value="">Você é convidado da noiva ou do noivo?</option>
<option value="Noiva">Noiva</option>
<option value="Noivo">Noivo</option>
</select>

<select id="acompanhantes" onchange="mostrarCampos()">
<option value="0">Sem acompanhantes</option>
<option value="1">1 acompanhante</option>
<option value="2">2 acompanhantes</option>
<option value="3">3 acompanhantes</option>
</select>

<div id="campos"></div>

<button id="btn" onclick="enviar()">Confirmar presença</button>

<div class="sucesso" id="msg">
Presença confirmada com sucesso 🤍
</div>

</div>

<script>

function mostrarCampos(){
  let qtd = document.getElementById("acompanhantes").value
  let div = document.getElementById("campos")

  div.innerHTML=""

  for(let i=1;i<=qtd;i++){
    div.innerHTML += `<input placeholder="Nome do acompanhante ${i}" id="ac${i}">`
  }
}

async function enviar(){

  let btn = document.getElementById("btn")
  btn.disabled = true
  btn.innerText = "Enviando..."

  let nome = document.getElementById("nome").value
  let lado = document.getElementById("lado").value
  let qtd = document.getElementById("acompanhantes").value

  let dados = {
    nome,
    lado,
    qtd
  }

  for(let i=1;i<=qtd;i++){
    dados["ac"+i] = document.getElementById("ac"+i).value || ""
  }

  try{
    await fetch("https://script.google.com/macros/s/AKfycbzVOMXoNQ29tQNAzM-hljX8-A7Flf5fC15DakT-Ijx6yZ4_xbjXaDEWYA3MriG9EirVdw/exec",{
      method:"POST",
      body:new URLSearchParams(dados)
    })

    document.getElementById("msg").style.display = "block"
    btn.innerText = "Confirmado ✓"

  }catch(e){
    alert("Erro ao enviar. Tente novamente.")
    btn.disabled = false
    btn.innerText = "Confirmar presença"
  }

}

</script>

</body>
</html>
